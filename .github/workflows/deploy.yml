name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        working-directory: ./client
        run: npm install

      - name: Generar .env para el build
        working-directory: ./client
        run: |
          echo "VITE_DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env
          echo "VITE_OUTLOOK_ICS_URL=${{ secrets.OUTLOOK_ICS_URL }}" >> .env

      - name: Build
        working-directory: ./client
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './client/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
